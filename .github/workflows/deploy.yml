name: Build and Deploy Django Service

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-2
  ECR_REPO: django
  APP_DIR: /home/ec2-user/django

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Debug
      - name: Verify Commit & Files
        run: |
          echo "COMMIT:"
          git log -1
          echo "FILES:"
          ls apps/common || true

      # 3. Setup Multi-Arch
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. AWS Auth
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 5. Login to ECR
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 6. Build & Push Image (Multi-Arch, No Cache)
      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${IMAGE_TAG}

          echo "Building image: $IMAGE_URI"

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --no-cache \
            -t $IMAGE_URI \
            --push .

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # 7. Deploy via SSM (Fully Fixed)
      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy django service" \
            --parameters commands="[
              \"set -e\",

              \"AWS_REGION=${{ env.AWS_REGION }}\",
              \"ECR=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com\",
              \"IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}\",

              \"echo Logging into ECR\",
              \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR\",

              \"cd ${{ env.APP_DIR }}\",

              \"echo Stopping old containers\",
              \"docker-compose down --remove-orphans || true\",

              \"echo Removing old images\",
              \"docker images | grep django | awk '{print \\$3}' | xargs -r docker rmi -f || true\",

              \"echo Cleaning system\",
              \"docker system prune -af || true\",

              \"echo Updating env\",
              \"sed -i '/IMAGE_URI/d' .env || true\",
              \"echo IMAGE_URI=$IMAGE_URI >> .env\",

              \"echo Pulling latest image\",
              \"docker pull $IMAGE_URI\",

              \"echo Starting containers with fresh image\",
              \"docker-compose up -d --force-recreate --no-build\",

              \"echo Running containers\",
              \"docker ps\"
            ]"

name: Build and Deploy Django Service

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-2
  ECR_REPO: django
  APP_DIR: /home/ec2-user/django

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup multi-arch builder
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      # 3. AWS login
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 4. Login ECR
      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 5. Build and Push Image (Multi-Arch)
      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${GITHUB_SHA}

          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:$IMAGE_TAG

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --no-cache \
            -t $IMAGE_URI \
            --push .

      # 6. Clean old ECR images (keep last 3)
      - name: Clean old ECR images
        run: |
          IMAGES=$(aws ecr describe-images \
            --repository-name ${{ env.ECR_REPO }} \
            --query 'sort_by(imageDetails,& imagePushedAt)[].imageTags[]' \
            --output text)

          COUNT=0
          for TAG in $IMAGES; do
            COUNT=$((COUNT+1))
            if [ $COUNT -le 3 ]; then
              continue
            fi

            aws ecr batch-delete-image \
              --repository-name ${{ env.ECR_REPO }} \
              --image-ids imageTag=$TAG || true
          done

      # 7. Deploy via SSM (DEBUG ENABLED)
      - name: Deploy to EC2 via SSM
        run: |
          set -e

          COMMAND_ID=$(aws ssm send-command \
            --targets "Key=instanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy django container" \
            --query "Command.CommandId" \
            --output text \
            --parameters commands="[
              \"set -ex\",

              \"echo ===== DEBUG START =====\",

              \"AWS_REGION=${{ env.AWS_REGION }}\",
              \"ECR=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com\",
              \"IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}\",

              \"echo IMAGE_URI: $IMAGE_URI\",

              \"aws --version\",
              \"docker --version\",
              \"docker ps\",

              \"echo Logging into ECR\",
              \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR\",

              \"cd ${{ env.APP_DIR }} || echo 'APP_DIR missing'\",

              \"echo Stopping containers\",
              \"docker-compose down --remove-orphans || true\",

              \"echo Removing old images\",
              \"docker-compose down --rmi all --remove-orphans || true\",

              \"echo Cleaning docker\",
              \"docker system prune -af || true\",

              \"echo Updating env\",
              \"sed -i '/IMAGE_URI/d' .env || true\",
              \"echo IMAGE_URI=$IMAGE_URI >> .env\",
              \"cat .env\",

              \"echo Pulling image\",
              \"docker pull $IMAGE_URI\",

              \"echo Starting containers\",
              \"docker-compose up -d --force-recreate --pull always\",

              \"docker ps\",

              \"echo ===== DEBUG END =====\"
            ]")

          echo "SSM Command ID: $COMMAND_ID"

          echo "Waiting for command to execute..."

          for i in {1..20}; do
            STATUS=$(aws ssm list-command-invocations \
              --command-id $COMMAND_ID \
              --details \
              --query "CommandInvocations[0].Status" \
              --output text)

            echo "Current Status: $STATUS"

            if [ "$STATUS" = "Success" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              break
            fi

            sleep 5
          done

          echo "Fetching logs..."

          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --output text

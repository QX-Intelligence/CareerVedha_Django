##Deployment Docker Pipeline
name: Build and Deploy Django Service

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-2
  ECR_REPO: django
  APP_DIR: /home/ec2-user/django

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Debug (keep this for now)
      - name: Verify Commit & Files
        run: |
          echo "COMMIT:"
          git log -1
          echo "FILES:"
          ls apps/common || true

      # 3. AWS Auth
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 4. Login to ECR
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 5. Build & Push Image (SIMPLE + RELIABLE)
      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:$IMAGE_TAG

          echo "Building image: $IMAGE_URI"

          docker build --no-cache -t $IMAGE_URI .
          docker push $IMAGE_URI

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # 6. Deploy via SSM (CLEAN + FORCED)
      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy django service" \
            --parameters "commands=[
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com\",
              \"cd ${{ env.APP_DIR }}\",
              \"docker-compose down --remove-orphans || true\",
              \"docker system prune -af\",
              \"export IMAGE_URI=${{ env.IMAGE_URI }}\",
              \"docker pull ${{ env.IMAGE_URI }}\",
              \"docker-compose up -d --force-recreate --no-build\",
              \"docker ps\"
            ]"

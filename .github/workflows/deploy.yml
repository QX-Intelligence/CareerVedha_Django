name: Build and Deploy Django Service

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-2
  ECR_REPO: django
  APP_DIR: /home/ec2-user/django

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup multi-arch builder
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      # 3. AWS login
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 4. Login ECR
      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 5. Build multi-arch image
      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${GITHUB_SHA}

          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:$IMAGE_TAG

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --no-cache \
            -t $IMAGE_URI \
            --push .

      # 6. Clean old ECR images
      - name: Clean old ECR images
        run: |
          IMAGES=$(aws ecr describe-images \
            --repository-name ${{ env.ECR_REPO }} \
            --query 'sort_by(imageDetails,& imagePushedAt)[].imageTags[]' \
            --output text)

          COUNT=0
          for TAG in $IMAGES; do
            COUNT=$((COUNT+1))
            if [ $COUNT -le 3 ]; then
              continue
            fi

            aws ecr batch-delete-image \
              --repository-name ${{ env.ECR_REPO }} \
              --image-ids imageTag=$TAG || true
          done

      # 7. Deploy via SSM
      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy django container" \
            --parameters 'commands=[

              "set -e",

              "AWS_REGION=${{ env.AWS_REGION }}",
              "ECR=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com",
              "IMAGE_URI=${{ env.IMAGE_URI }}",

              "echo Login to ECR",
              "aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR",

              "cd ${{ env.APP_DIR }}",

              "echo Stop old containers",
              "docker-compose down --remove-orphans || true",

              "echo Remove old compose images",
              "docker-compose down --rmi all --remove-orphans || true",

              "echo Clean docker cache",
              "docker system prune -af || true",

              "echo Update env file",
              "sed -i \"/IMAGE_URI/d\" .env || true",
              "echo IMAGE_URI=$IMAGE_URI >> .env",

              "echo Pull latest image",
              "docker pull $IMAGE_URI",

              "echo Start containers with latest image",
              "docker-compose up -d --force-recreate --pull always",

              "echo Running containers",
              "docker ps"

            ]'
